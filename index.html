        function App() {
            const [currentView, setCurrentView] = useState('home'); 
            const [activeFolder, setActiveFolder] = useState(null);

            const handleOpenFolder = (folderName) => {
                setActiveFolder(folderName);
                setCurrentView('folder');
            };

            return (
                <div>
                    <Navbar setView={setCurrentView} />
                    {currentView === 'home' && <HomeView openFolder={handleOpenFolder} />}
                    {currentView === 'folder' && <FolderDetail folderName={activeFolder} goBack={() => setCurrentView('home')} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

        // ==========================================
        // 4. MAIN APP CONTROLLER
        // ==========================================
        function App() {
            const [view, setView] = useState('home'); // 'home' or 'project'
            const [selectedProject, setSelectedProject] = useState('');

            const handleOpenProject = (projectName) => {
                setSelectedProject(projectName);
                setView('project');
                window.scrollTo(0, 0);
            };

            const handleGoBack = () => {
                setView('home'); 
                window.scrollTo(0, 0);
            };

            return (
                <div>
                    <Navbar />
                    <main className="max-w-6xl mx-auto px-4 mt-6 pb-12">
                        {view === 'home' ? (
                            <HomeView onOpenProject={handleOpenProject} />
                        ) : (
                            <ProjectView projectName={selectedProject} goBack={handleGoBack} />
                        )}
                    </main>
                </div>
            );
        }

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
