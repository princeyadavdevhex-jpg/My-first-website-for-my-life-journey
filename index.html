        function SignUpModal({ isOpen, onClose }) {
            const [email, setEmail] = useState("");

            const handleGithubLogin = () => {
                auth.signInWithPopup(githubProvider).then((result) => {
                    alert("Welcome " + result.user.displayName + "! GitHub Login Successful 🚀");
                    onClose(); 
                }).catch((error) => alert("Error: " + error.message));
            };

            const handleGoogleLogin = () => {
                auth.signInWithPopup(googleProvider).then((result) => {
                    alert("Welcome " + result.user.displayName + "! Google Login Successful 🚀");
                    onClose(); 
                }).catch((error) => alert("Error: " + error.message));
            };

            const handleEmailSignup = (e) => {
                e.preventDefault();
                auth.createUserWithEmailAndPassword(email, password).then((userCredential) => {
                    alert("Account Created Successfully! Welcome to Workspace 🚀");
                    onClose();
                }).catch((error) => alert("Error: " + error.message));
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-all p-4">
                    <div className="bg-[#161b22] border border-[#30363d] rounded-lg w-full max-w-sm p-6 relative shadow-2xl">

                                <i className="fab fa-google text-red-500"></i> Sign up with Google
                            </button>
                            
                            <button onClick={handleGithubLogin} className="flex items-center justify-center gap-2 w-full bg-[#24292e] text-white text-sm font-bold py-2 rounded border border-[#30363d] hover:bg-[#30363d] transition-colors">
                                <i className="fab fa-github"></i> Sign up with GitHub
                            </button>
                        </div>

                        <div className="flex items-center gap-2 mb-4">
                            <div className="h-px bg-[#30363d] flex-1"></div>
                            <span className="text-gray-500 text-[10px] uppercase font-bold">Or</span>
                            <div className="h-px bg-[#30363d] flex-1"></div>
                        </div>

                        <form onSubmit={handleEmailSignup} className="flex flex-col gap-3">
                            <div>
                                <label className="block text-gray-400 text-xs font-semibold mb-1">Email</label>
                                <input type="email" value={email} onChange={(e)=>setEmail(e.target.value)} required className="w-full bg-[#0d1117] border border-[#30363d] rounded px-3 py-1.5 text-sm text-white outline-none focus:border-blue-500" />
                            </div>
                            <div>
                                <label className="block text-gray-400 text-xs font-semibold mb-1">Password</label>
                                <input type="password" value={password} onChange={(e)=>setPassword(e.target.value)} required className="w-full bg-[#0d1117] border border-[#30363d] rounded px-3 py-1.5 text-sm text-white outline-none focus:border-blue-500" />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 rounded mt-1">
                                Create Account
                            </button>
                        </form>
                    </div>

            );

                            </div>

                                </div>
                            </div>
                            <div className="p-4 overflow-x-auto code-scroll flex-1">
                                <pre className="text-xs text-green-400 font-mono m-0 leading-relaxed"><code>{sampleCode}</code></pre>
                            </div>
                        </div>
                    </div>

                    {/* FOLDER TABS (Secondary Files) */}
                    <div className="flex border-b border-[#30363d] mb-4 overflow-x-auto text-xs">
                        {['code-files', 'image', 'pdf', 'video', 'ai-chat'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 font-semibold capitalize whitespace-nowrap ${activeTab === tab ? 'text-white border-b-2 border-orange-500' : 'text-gray-400 hover:text-white'}`}>
                                {tab === 'ai-chat' ? <><i className="fas fa-robot mr-1 text-purple-400"></i> AI Chat</> : tab.replace('-', ' ')}
                            </button>
                        ))}
                    </div>

                    <div className="github-border github-bg rounded-lg min-h-[300px] flex items-center justify-center p-4">
                        {activeTab === 'code-files' && <div className="text-xs text-gray-500">Other supplementary code files will appear here.</div>}

                                        </div>
                                    ))}
                                </div>
                                <form onSubmit={handleChat} className="flex gap-2">
