<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Yadav | Workspace</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .github-border { border: 1px solid #30363d; }
        .github-bg { background-color: #161b22; }
        .glass-header { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); }
        .profile-banner { background-image: url('https://prince-tech-labs-workspace.vercel.app/1774681471566.png'); background-size: cover; background-position: center; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // FIREBASE SETUP & DATABASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAwrlhB5ZQFMaA6wmNC8oXp0_sWVAASrPY", 
            authDomain: "work-space-packet.firebaseapp.com",
            projectId: "work-space-packet",
            storageBucket: "work-space-packet.appspot.com", 
            messagingSenderId: "841757590804",
            appId: "1:841757590804:web:9cfe37ee00609b6c046e01"
        };

        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();
        const githubProvider = new window.firebase.auth.GithubAuthProvider();
        const googleProvider = new window.firebase.auth.GoogleAuthProvider();

        // Database Save Function
        const saveUserToDB = (user) => {
            if(!user) return;
            db.collection("users").doc(user.uid).set({
                email: user.email,
                name: user.displayName || "Workspace User",
                photoURL: user.photoURL || "",
                lastLogin: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).catch(err => console.log("DB Save Error:", err));
        };

        // ==========================================
        // SIGN UP MODAL (Saves to DB)
        // ==========================================
        function SignUpModal({ isOpen, onClose }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");

            const handleGoogleLogin = async () => {
                try {
                    const result = await auth.signInWithPopup(googleProvider);
                    saveUserToDB(result.user);
                    onClose();
                } catch (error) { alert("Error: " + error.message); }
            };

            const handleGithubLogin = async () => {
                try {
                    const result = await auth.signInWithPopup(githubProvider);
                    saveUserToDB(result.user);
                    onClose();
                } catch (error) { alert("Error: " + error.message); }
            };

            const handleEmailSignup = async (e) => {
                e.preventDefault();
                try {
                    const result = await auth.createUserWithEmailAndPassword(email, password);
                    saveUserToDB(result.user);
                    onClose();
                } catch (error) { alert("Error: " + error.message); }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                    <div className="bg-[#161b22] border border-[#30363d] rounded-md w-full max-w-xs p-5 relative shadow-2xl">
                        <button onClick={onClose} className="absolute top-2 right-2 text-gray-400 hover:text-white"><i className="fas fa-times"></i></button>
                        <h2 className="text-lg font-bold text-white mb-3 text-center">Join Workspace</h2>
                        
                        <div className="flex flex-col gap-2 mb-3">
                            <button onClick={handleGoogleLogin} className="flex items-center justify-center gap-2 w-full bg-white text-black text-[11px] font-bold py-1.5 rounded hover:bg-gray-200">
                                <i className="fab fa-google text-red-500"></i> Google
                            </button>
                            <button onClick={handleGithubLogin} className="flex items-center justify-center gap-2 w-full bg-[#24292e] text-white text-[11px] font-bold py-1.5 rounded border border-[#30363d] hover:bg-[#30363d]">
                                <i className="fab fa-github"></i> GitHub
                            </button>
                        </div>

                        <div className="flex items-center gap-2 mb-3">
                            <div className="h-px bg-[#30363d] flex-1"></div>
                            <span className="text-gray-500 text-[9px] uppercase font-bold">Or Email</span>
                            <div className="h-px bg-[#30363d] flex-1"></div>
                        </div>

                        <form onSubmit={handleEmailSignup} className="flex flex-col gap-2">
                            <input type="email" placeholder="Email" value={email} onChange={(e)=>setEmail(e.target.value)} required className="w-full bg-[#0d1117] border border-[#30363d] rounded px-2 py-1 text-xs text-white outline-none focus:border-blue-500" />
                            <input type="password" placeholder="Password" value={password} onChange={(e)=>setPassword(e.target.value)} required className="w-full bg-[#0d1117] border border-[#30363d] rounded px-2 py-1 text-xs text-white outline-none focus:border-blue-500" />
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold py-1.5 rounded mt-1">Sign Up</button>
                        </form>
                    </div>
                </div>
            );
        }
                        
        // ==========================================
        // COMPACT NAVBAR (Real-time Auth State)
        // ==========================================
        function Navbar({ setView, openFolder, user }) {
            const [isSignUpOpen, setIsSignUpOpen] = useState(false);

            return (
                <>
                    <nav className="glass-header sticky top-0 z-50 border-b border-[#30363d]">
                        <div className="max-w-5xl mx-auto px-3 py-1.5 flex flex-wrap items-center justify-between gap-2">
                            <div className="flex items-center gap-1.5 cursor-pointer" onClick={() => setView('home')}>
                                <i className="fas fa-terminal text-blue-500 text-xs"></i>
                                <span className="font-bold text-white text-[11px]">Workspace</span>
                            </div>
                            
                            <div className="flex justify-center gap-3 text-[10px] font-semibold">
                                <span onClick={() => setView('home')} className="text-gray-400 hover:text-white cursor-pointer">Home</span>
                                <span onClick={() => openFolder('2D Project')} className="text-gray-400 hover:text-white cursor-pointer"><i className="fas fa-folder text-yellow-500 mr-0.5"></i>2D Project</span>
                                <span onClick={() => openFolder('Real Hardware Project')} className="text-gray-400 hover:text-white cursor-pointer"><i className="fas fa-microchip text-green-500 mr-0.5"></i>Hardware</span>
                            </div>
                            
                            <div className="flex justify-end items-center gap-2">
                                <a href="https://www.youtube.com/@PRINCE_TECHMOTION_LAB" target="_blank" className="text-gray-400 hover:text-red-500 text-xs"><i className="fab fa-youtube"></i></a>
                                <a href="https://github.com/princeyadavdevhex-jpg" target="_blank" className="text-gray-400 hover:text-white text-xs"><i className="fab fa-github"></i></a>
                                
                                {/* DYNAMIC AUTH UI */}
                                {user ? (
                                    <div className="flex items-center gap-2 ml-1">
                                        <img src={user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${user.email}`} alt="User" className="w-5 h-5 rounded-full border border-gray-600" title={user.email} />
                                        <button onClick={() => auth.signOut()} className="text-[10px] text-red-400 hover:text-red-300 font-bold">Logout</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsSignUpOpen(true)} className="bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-2 py-1 rounded">Sign Up</button>
                                )}
                            </div>
                        </div>
                    </nav>
                    <SignUpModal isOpen={isSignUpOpen} onClose={() => setIsSignUpOpen(false)} />
                </>
            );
        }

        // ==========================================
        // FOLDER DETAIL & BIG CODE BANNER
        // ==========================================
        function FolderDetail({ folderName, goBack }) {
            const [activeTab, setActiveTab] = useState('code-files');
            const [chatMsg, setChatMsg] = useState("");
            const [chats, setChats] = useState([{ sender: 'ai', text: "Hello! AI Assistant active. How can I help?" }]);

            const handleChat = (e) => {
                e.preventDefault();
                if(!chatMsg.trim()) return;
                setChats([...chats, { sender: 'user', text: chatMsg }, { sender: 'ai', text: "Processing your request..." }]);
                setChatMsg("");
            };

            // Using string concatenation to prevent Babel parsing errors
            const sampleCode = "#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << \"Running " + folderName + "\" << endl;\n    // Step 1: Initialize hardware/OS components\n    // Step 2: Execute logic\n    return 0;\n}";

            return (
                <div className="max-w-5xl mx-auto px-3 py-4 animate-fade-in">
                    <button onClick={goBack} className="mb-2 text-blue-400 hover:text-blue-300 text-[10px] font-semibold"><i className="fas fa-arrow-left mr-1"></i> Back</button>
                    <h2 className="text-sm font-bold text-white mb-3"><i className="fas fa-folder-open text-yellow-500 mr-1.5"></i>{folderName}</h2>
                    
                    {/* BIG CODE BANNER & GUIDE */}
                    <div className="mb-4 flex flex-col md:flex-row gap-2">
                        <div className="github-border github-bg rounded p-3 flex-1">
                            <h3 className="text-[11px] font-bold text-white mb-1.5 border-b border-[#30363d] pb-1"><i className="fas fa-list-ol text-blue-400 mr-1"></i>Guide</h3>
                            <div className="text-[10px] text-gray-300 space-y-1">
                                <p><strong>1.</strong> Copy code from the right panel.</p>
                                <p><strong>2.</strong> Paste in your local IDE/Compiler.</p>
                                <p><strong>3.</strong> Build and flash/run the project.</p>
                                <p className="text-gray-500 italic mt-1">Found an error? Use Suggest Fix.</p>
                            </div>
                        </div>

                        <div className="github-border bg-[#0d1117] rounded flex-[2] relative overflow-hidden flex flex-col">
                            <div className="bg-[#161b22] border-b border-[#30363d] px-2 py-1 flex justify-between items-center">
                                <span className="text-[10px] text-gray-400 font-mono">main.cpp</span>
                                <div className="flex gap-1.5">
                                    <button onClick={()=>alert("Code copied!")} className="text-[9px] text-gray-400 hover:text-white bg-[#30363d] px-1.5 py-0.5 rounded"><i className="fas fa-copy mr-1"></i>Copy</button>
                                    <button onClick={()=>alert("Request sent!")} className="text-[9px] text-orange-400 hover:text-orange-300 bg-[#30363d] px-1.5 py-0.5 rounded"><i className="fas fa-wrench mr-1"></i>Suggest Fix</button>
                                </div>
                            </div>
                            <div className="p-2 overflow-x-auto h-32">
                                <pre className="text-[10px] text-green-400 font-mono m-0"><code>{sampleCode}</code></pre>
                            </div>
                        </div>
                    </div>

                    {/* TABS */}
                    <div className="flex border-b border-[#30363d] mb-3 overflow-x-auto text-[10px]">
                        {['code-files', 'image', 'pdf', 'video', 'ai-chat'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-3 py-1.5 font-semibold capitalize whitespace-nowrap ${activeTab === tab ? 'text-white border-b border-orange-500' : 'text-gray-400 hover:text-white'}`}>
                                {tab === 'ai-chat' ? <><i className="fas fa-robot text-purple-400 mr-1"></i> Chat</> : tab.replace('-', ' ')}
                            </button>
                        ))}
                    </div>

                    <div className="github-border github-bg rounded min-h-[200px] flex items-center justify-center p-3">
                        {activeTab === 'code-files' && <div className="text-[10px] text-gray-500">Other files here.</div>}
                        {activeTab === 'image' && <div className="text-[10px] text-gray-500"><i className="fas fa-image text-lg mb-1 block text-center"></i> No images</div>}
                        {activeTab === 'pdf' && <div className="text-[10px] text-gray-500"><i className="fas fa-file-pdf text-lg mb-1 block text-center text-red-400"></i> No PDFs</div>}
                        {activeTab === 'video' && <div className="text-[10px] text-gray-500"><i className="fas fa-video text-lg mb-1 block text-center text-blue-400"></i> No video</div>}
                        
                        {activeTab === 'ai-chat' && (
                            <div className="w-full flex flex-col h-[200px]">
                                <div className="flex-1 overflow-y-auto mb-2 space-y-2 pr-1 text-[10px]">
                                    {chats.map((c, i) => (
                                        <div key={i} className={`flex ${c.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`px-2 py-1 rounded max-w-[80%] ${c.sender === 'user' ? 'bg-blue-600 text-white' : 'bg-[#30363d] text-gray-200'}`}>
                                                {c.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <form onSubmit={handleChat} className="flex gap-1">
                                    <input type="text" value={chatMsg} onChange={(e)=>setChatMsg(e.target.value)} placeholder="Ask AI..." className="flex-1 bg-[#0d1117] border border-[#30363d] rounded px-2 py-1 text-[10px] text-white outline-none" />
                                    <button type="submit" className="bg-purple-600 hover:bg-purple-700 px-3 py-1 rounded text-white"><i className="fas fa-paper-plane text-[10px]"></i></button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // HOME VIEW COMPONENT
        // ==========================================
        function HomeView({ openFolder }) {
            const projects = [
                { name: "2D Project", desc: "My graphical and game development logic files.", icon: "fas fa-gamepad text-pink-400" },
                { name: "Real Hardware Project", desc: "Solar tracking and embedded systems code.", icon: "fas fa-microchip text-green-400" },
                { name: "Nexus-OS-Core", desc: "Main kernel files for my custom OS.", icon: "fas fa-laptop-code text-blue-400" },
                { name: "AI-School-App", desc: "Learning platform backend and frontend.", icon: "fas fa-brain text-purple-400" }
            ];

            return (
                <div className="max-w-5xl mx-auto px-3 py-4 animate-fade-in">
                    {/* Banner & Profile */}
                    <div className="w-full rounded overflow-hidden github-border mb-4">
                        <div className="w-full h-24 md:h-32 profile-banner relative"></div>
                        <div className="github-bg px-3 pb-3 relative">
                            <div className="flex justify-between items-end -mt-8 mb-1 relative z-10">
                                <div className="flex items-end gap-2">
                                    <div className="w-16 h-16 rounded-full border-[3px] border-[#161b22] bg-[#0d1117] flex-shrink-0 overflow-hidden">
                                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Prince" alt="Logo" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="pb-0.5">
                                        <h1 className="text-sm md:text-base font-bold text-white">Prince Yadav</h1>
                                        <p className="text-gray-400 text-[9px]">@princeyadavdevhex-jpg</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Compact Bio */}
                    <div className="github-border github-bg rounded p-3 mb-4">
                        <h3 className="text-[11px] font-bold text-white mb-1"><i className="fas fa-user-astronaut mr-1.5 text-blue-400"></i> About Me</h3>
                        <p className="text-gray-300 text-[10px] leading-relaxed">
                            Hi! I'm Prince Yadav, a Class 8 student at JNV Prayagraj. Passionate about C++, Python, ethical hacking, and
