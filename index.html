<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Yadav | Workspace</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

   <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    

    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0;
            padding: 0;
        }
        .github-border { border: 1px solid #30363d; }
        .github-bg { background-color: #161b22; }
        .glass-header { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
        
        pre[class*="language-"] { border-radius: 0 0 8px 8px; margin: 0; background: #0d1117; }
        
        .profile-banner { 
            background-image: url('https://prince-tech-labs-workspace.vercel.app/1774681471566.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. FIREBASE SETUP
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAwrlhB5ZQFMaA6wmNC8oXp0_sWVAASrPY", 
            authDomain: "work-space-packet.firebaseapp.com",
            projectId: "work-space-packet",
            storageBucket: "work-space-packet.appspot.com",
            messagingSenderId: "841757590804",
            appId: "1:841757590804:web:9cfe37ee00609b6c046e01"
        };
        
        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();
        const githubProvider = new window.firebase.auth.GithubAuthProvider();
        const googleProvider = new window.firebase.auth.GoogleAuthProvider();

        const saveUser = (user) => {
            if(!user) return;
            db.collection("users").doc(user.uid).set({
                email: user.email, 
                name: user.displayName || "Workspace User", 
                photoURL: user.photoURL || "", 
                lastLogin: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        };

        // ==========================================
        // 2. SIGN UP MODAL COMPONENT
        // ==========================================
        function SignUpModal({ isOpen, onClose }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            
            if (!isOpen) return null;

            const handleLogin = (provider) => {
                auth.signInWithPopup(provider)
                    .then(res => { saveUser(res.user); alert("Welcome!"); onClose(); })
                    .catch(e => alert(e.message));
            };
            
            const handleEmail = (e) => {
                e.preventDefault();
                auth.createUserWithEmailAndPassword(email, password)
                    .then(res => { saveUser(res.user); alert("Account Created!"); onClose(); })
                    .catch(e => alert(e.message));
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-all">
                    <div className="bg-[#161b22] border border-[#30363d] rounded-xl w-full max-w-md p-8 relative shadow-2xl animate-fade-in">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white">
                            <i className="fas fa-times text-xl"></i>
                        </button>
                        <h2 className="text-2xl font-bold text-white mb-6 text-center">Join Workspace</h2>
                        
                        <div className="flex flex-col gap-3 mb-6">
                            <button onClick={()=>handleLogin(googleProvider)} className="flex justify-center items-center gap-3 w-full bg-white text-black font-bold py-2.5 rounded hover:bg-gray-200 transition-colors">
                                <i className="fab fa-google text-red-500 text-lg"></i> Sign up with Google
                            </button>
                            <button onClick={()=>handleLogin(githubProvider)} className="flex justify-center items-center gap-3 w-full bg-[#24292e] text-white font-bold py-2.5 rounded border border-[#30363d] hover:bg-[#30363d] transition-colors">
                                <i className="fab fa-github text-lg"></i> Sign up with GitHub
                            </button>
                        </div>
                        
                        <div className="flex items-center gap-3 mb-6">
                            <div className="h-px bg-[#30363d] flex-1"></div>
                            <span className="text-gray-500 text-xs uppercase font-semibold">Or Email</span>
                            <div className="h-px bg-[#30363d] flex-1"></div>
                        </div>
                        
                        <form onSubmit={handleEmail} className="flex flex-col gap-4">
                            <input type="email" required placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white outline-none focus:border-blue-500 transition-colors" />
                            <input type="password" required placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white outline-none focus:border-blue-500 transition-colors" />
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded mt-2 transition-colors">Create Account</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. NAVBAR COMPONENT
        // ==========================================
        function Navbar({ setView, onOpenProject, user }) {
            const [isSignUpOpen, setIsSignUpOpen] = useState(false);
            
            return (
                <>
                    <nav className="glass-header sticky top-0 z-50 border-b border-[#30363d]">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            
                            {/* Logo */}
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <i className="fas fa-terminal text-blue-500 text-xl"></i>
                                <span className="font-bold hidden md:block text-white tracking-wide">Workspace</span>
                            </div>
                            
                            {/* Links */}
                            <div className="flex justify-center gap-6 text-sm font-semibold">
                                <span onClick={() => setView('home')} className="text-white hover:text-blue-400 cursor-pointer transition-colors">Home</span>
                                <span onClick={() => onOpenProject({ name: '2D Projects', id: 'static-2d' })} className="text-gray-400 hover:text-white cursor-pointer transition-colors">2D Projects</span>
                                <span onClick={() => onOpenProject({ name: 'Real Hardware Project', id: 'static-hw' })} className="text-gray-400 hover:text-white cursor-pointer transition-colors">Real Hardware Project</span>
                            </div>
                            
                            {/* User Actions */}
                            <div className="flex justify-end items-center gap-4">
                                <a href="https://www.youtube.com/@PRINCE_TECHMOTION_LAB" target="_blank" className="text-gray-400 hover:text-red-500 transition-colors">
                                    <i className="fab fa-youtube text-xl"></i>
                                </a>
                                <a href="https://github.com/princeyadavdevhex-jpg" target="_blank" className="text-gray-400 hover:text-white transition-colors">
                                    <i className="fab fa-github text-xl"></i>
                                </a>
                                
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        {/* 🚀 PRINCE BHAI KA SECRET ADMIN BUTTON 🚀 */}
                                        
                                           {user?.email?.toLowerCase() === "princeyadavdev.hex@gmail.com" && ( 
                                              <button 
                                                onClick={() => setView('admin')} 
                                                className="bg-orange-600 text-white px-3 py-1.5 rounded-md text-xs font-black shadow-[0_0_10px_rgba(234,88,12,0.4)] hover:bg-orange-700 transition-all mr-1"
                                            >
                                                <i className="fas fa-user-shield mr-1"></i> MANAGE
                                            </button>
                                        )}
                                        
                                        <img src={user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${user.email}`} className="w-8 h-8 rounded-full border border-[#30363d]" alt="Profile" />
                                        <button onClick={() => auth.signOut()} className="text-red-400 text-sm font-bold hover:text-red-500 transition-colors">Logout</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsSignUpOpen(true)} className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-1.5 rounded transition-all shadow-lg">Sign Up</button>
                                )}
                            </div>
                        </div>
                    </nav>
                    <SignUpModal isOpen={isSignUpOpen} onClose={() => setIsSignUpOpen(false)} />
                </>
            );
        }

        // ==========================================
        // 4. HOME VIEW COMPONENT
        // ==========================================
        function HomeView({ onOpenProject }) {
            const [folders, setFolders] = useState([]);
            
            const skills = [
                { name: 'C++ Architecture', icon: 'fa-code text-blue-500' },
                { name: 'Python / AI', icon: 'fab fa-python text-yellow-400' },
                { name: 'Ethical Hacking', icon: 'fa-shield-alt text-green-500' },
                { name: 'Web Development', icon: 'fa-globe text-cyan-400' }
            ];

            useEffect(() => {
                const unsub = db.collection("folders").orderBy("timestamp", "desc").onSnapshot(snap => {
                    const folderList = snap.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setFolders(folderList);
                }, (error) => {
                    console.log("Error fetching folders: ", error);
                });
                return () => unsub();
            }, []);

            return (
                <div className="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
                    {/* Banner & Profile Section */}
                    <div className="w-full rounded-xl overflow-hidden github-border mb-10 shadow-lg">
                        <div className="w-full aspect-[16/9] md:aspect-[21/9] profile-banner relative"></div>
                        <div className="github-bg px-6 pb-6 relative">
                            <div className="flex justify-between items-end -mt-16 mb-4 relative z-10">
                                <div className="flex items-end gap-4">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Prince" className="w-32 h-32 rounded-full border-4 border-[#161b22] bg-[#0d1117] shadow-xl" alt="Avatar" />
                                    <div className="pb-2">
                                        <h1 className="text-3xl font-bold text-white tracking-tight">Prince Yadav</h1>
                                        <p className="text-gray-400 text-sm mt-1">@princeyadavdevhex-jpg • C++ & Tech Explorer</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Left Sidebar: Core Skills */}
                        <div className="md:col-span-1">
                            <div className="bg-[#161b22] github-border rounded-lg p-5 shadow-md">
                                <h3 className="font-bold border-b border-[#30363d] pb-3 mb-4 text-white text-lg">Core Skills</h3>
                                <div className="flex flex-col gap-4">
                                    {skills.map(s => (
                                        <div key={s.name} className="flex items-center gap-3 text-gray-300 hover:text-white transition-colors p-2 rounded hover:bg-[#30363d]">
                                            <i className={`fas ${s.icon} text-xl w-6 text-center`}></i> 
                                            <span className="font-medium">{s.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Right Content: Dynamic Folders */}
                        <div className="md:col-span-2">
                            <div className="flex justify-between items-center border-b border-[#30363d] pb-3 mb-5">
                                <h2 className="text-xl font-bold text-white">
                                    <i className="fas fa-folder-open mr-2 text-yellow-500"></i> Project Repositories
                                </h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {folders.length === 0 ? (
                                    <div className="col-span-2 github-border github-bg rounded-lg p-8 text-center">
                                        <i className="fas fa-folder-minus text-4xl text-gray-600 mb-3"></i>
                                        <p className="text-gray-400 font-medium">Abhi koi folder nahi hai. Admin dashboard se naya dalo!</p>
                                    </div>
                                ) : (
                                    folders.map(f => (
                                        <div 
                                            key={f.id} 
                                            onClick={() => onOpenProject(f)} 
                                            className="github-border github-bg rounded-lg p-6 hover:border-blue-500 cursor-pointer transition-all group shadow-md"
                                        >
                                            <div className="flex items-center gap-4">
                                                <i className="fas fa-folder text-4xl text-blue-500 group-hover:scale-110 transition-transform"></i>
                                                <div>
                                                    <h3 className="text-white font-bold group-hover:text-blue-400 tracking-tight text-lg">
                                                        {f.name}
                                                    </h3>
                                                    <p className="text-xs text-gray-500 mt-1 uppercase font-semibold">Click to open files</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // ==========================================
        // 5. PROJECT VIEW COMPONENT (REAL-TIME FILES)
        // ==========================================
        
              function ProjectView({ project, goBack }) {
            const [contents, setContents] = useState([]);

            useEffect(() => {
                const unsub = db.collection("files")
                    .where("folderId", "==", project.id)
                    .orderBy("timestamp", "asc") 
                    .onSnapshot(snap => {
                        setContents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => window.Prism?.highlightAll(), 500);
                    });
                return () => unsub();
            }, [project.id]);

            return (
                <div className="max-w-4xl mx-auto px-4 py-8 animate-fade-in">
                    <button onClick={goBack} className="mb-6 text-blue-400 font-bold">← Back to Workspace</button>
                    <h1 className="text-4xl font-black text-white mb-10 border-b-4 border-blue-500 pb-4 uppercase">{project.name}</h1>

                    <div className="space-y-12">
                        {contents.map((item, index) => (
                            <div key={item.id} className="animate-fade-in" style={{animationDelay: `${index * 0.1}s`}}>
                                {item.type === 'code' && (
                                    <div className="github-border rounded-lg overflow-hidden shadow-2xl">
                                        <div className="bg-[#161b22] px-4 py-2 text-xs font-mono text-gray-400 border-b border-[#30363d] flex justify-between">
                                            <span>{item.name || 'source_code.cpp'}</span>
                                            <button onClick={() => {navigator.clipboard.writeText(item.content); alert('Code Copied!')}} className="hover:text-white">COPY</button>
                                        </div>
                                        <pre className="m-0 p-4 bg-[#0d1117] overflow-x-auto"><code className="language-cpp">{item.content}</code></pre>
                                    </div>
                                )}
                                {item.type === 'image' && (
                                    <div className="rounded-xl overflow-hidden shadow-lg border border-[#30363d]">
                                        <img src={item.url} className="w-full h-auto" alt="Project Step" />
                                        {item.name && <p className="bg-[#161b22] p-3 text-sm text-gray-400 italic">{item.name}</p>}
                                    </div>
                                )}
                                {item.type === 'video' && (
                                    <div className="rounded-xl overflow-hidden shadow-lg bg-black border border-[#30363d]">
                                        <video src={item.url} controls className="w-full"></video>
                                    </div>
                                )}
                                {item.type === 'raw' && (
                                    <a href={item.url} target="_blank" className="flex items-center gap-4 bg-[#161b22] p-6 rounded-xl border border-red-900/30 hover:border-red-500 transition-all">
                                        <i className="fas fa-file-pdf text-4xl text-red-500"></i>
                                        <div>
                                            <h4 className="text-white font-bold underline">Download Documentation (PDF)</h4>
                                            <p className="text-xs text-gray-500 mt-1 uppercase tracking-widest">{item.name}</p>
                                        </div>
                                    </a>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
                        }
                    

        
        // ==========================================
        // 6. ADMIN VIEW COMPONENT (FULL CONTROL)
        // ==========================================
                // ==========================================
        // 6. ADMIN VIEW COMPONENT (FULL CONTROL WITH CODE UPLOAD)
        // ==========================================
        function AdminView({ setView }) {
            const [selectedFolder, setSelectedFolder] = useState(null);
            const [folders, setFolders] = useState([]);
            const [codeContent, setCodeContent] = useState("");
            const [fileName, setFileName] = useState("");

            useEffect(() => {
                const unsub = db.collection("folders").orderBy("timestamp", "desc").onSnapshot(snap => {
                    setFolders(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            // FIREBASE MEIN DIRECT CODE DALNA
            const saveCode = async () => {
                if(!selectedFolder) return alert("Pehle folder select karo!");
                await db.collection("files").add({
                    name: fileName || "code.cpp",
                    content: codeContent,
                    type: "code",
                    folderId: selectedFolder.id,
                    timestamp: window.firebase.firestore.FieldValue.serverTimestamp()
                });
                setCodeContent(""); setFileName(""); alert("Code Added Successfully!");
            };

            // CLOUDINARY MEIN MEDIA DALNA
            const openCloudinary = () => {
                if(!selectedFolder) return alert("Pehle folder chuno!");
                window.cloudinary.createUploadWidget({
                    cloudName: "dp2dctx9w", uploadPreset: "prince_preset"
                }, async (err, res) => {
                    if(!err && res.event === "success") {
                        await db.collection("files").add({
                            name: res.info.original_filename,
                            url: res.info.secure_url,
                            type: res.info.resource_type, // image/video/raw
                            folderId: selectedFolder.id,
                            timestamp: window.firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("Media Uploaded Successfully!");
                    }
                }).open();
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-10 animate-fade-in">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-bold text-white"><i className="fas fa-tools text-orange-500 mr-2"></i> Build Project Content</h2>
                        <button onClick={() => setView('home')} className="bg-red-600 px-4 py-2 rounded font-bold text-xs text-white">EXIT ADMIN</button>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {/* 1. SELECT FOLDER */}
                        <div className="bg-[#161b22] p-5 rounded-xl border border-[#30363d]">
                            <h3 className="text-xs font-black text-gray-500 mb-4 uppercase">Step 1: Select Project</h3>
                            <div className="max-h-[400px] overflow-y-auto pr-2">
                                {folders.map(f => (
                                    <button key={f.id} onClick={() => setSelectedFolder(f)} className={`w-full text-left p-3 mb-2 rounded border text-sm font-bold transition-all ${selectedFolder?.id === f.id ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-[#30363d] text-gray-400 hover:border-gray-500'}`}>
                                        <i className="fas fa-folder mr-2"></i> {f.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 2. ADD CONTENT */}
                        <div className="md:col-span-2 space-y-6">
                            {/* Media Upload */}
                            <div className="bg-[#161b22] p-6 rounded-xl border-2 border-dashed border-[#30363d] text-center">
                                <p className="text-gray-400 mb-4 text-sm font-bold uppercase">Step 2: Upload Images/Videos/PDF</p>
                                <button onClick={openCloudinary} className="bg-green-600 px-8 py-3 rounded-full font-black text-xs text-white shadow-lg hover:bg-green-700 transition-all">
                                    <i className="fas fa-cloud-upload-alt mr-2"></i> OPEN CLOUDINARY
                                </button>
                            </div>

                            {/* Code Editor */}
                            <div className="bg-[#161b22] p-6 rounded-xl border border-[#30363d]">
                                <p className="text-gray-400 mb-4 text-sm font-bold uppercase">Step 3: Add Step-by-Step Code/Text</p>
                                <input type="text" placeholder="File Name (e.g. main.cpp or Step 1)" value={fileName} onChange={e=>setFileName(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded p-3 mb-3 text-white outline-none focus:border-blue-500" />
                                <textarea rows="8" placeholder="Paste your code or tutorial text here..." value={codeContent} onChange={e=>setCodeContent(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded p-4 text-sm font-mono text-blue-300 outline-none"></textarea>
                                <button onClick={saveCode} className="mt-4 bg-blue-600 hover:bg-blue-700 text-white w-full py-3 rounded-lg font-bold shadow-lg transition-all">SAVE CODE TO FIREBASE</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
      }
                                                     

        // ==========================================
        // 7. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [view, setView] = useState('home'); 
            const [currentProject, setCurrentProject] = useState(null);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                });
                return () => unsubscribe();
            }, []);

            const handleOpenProject = (project) => {
                setCurrentProject(project);
                setView('project');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar setView={setView} onOpenProject={handleOpenProject} user={user} />
                    
                    <main className="flex-1">
                        {view === 'home' && <HomeView onOpenProject={handleOpenProject} />}
                        {view === 'project' && currentProject && <ProjectView project={currentProject} goBack={() => setView('home')} />}
                        {view === 'admin' && user?.email?.toLowerCase() === "princeyadavdev.hex@gmail.com" && <AdminView setView={setView} />}
                        

                        
                    </main>

                    <footer className="border-t border-[#30363d] py-6 mt-10">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <p className="text-gray-500 text-sm font-medium">
                                © 2026 Prince Tech Labs • Built with C++ architecture mindsets.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
