        function SignUpModal({ isOpen, onClose }) {

        function AdminDashboard({ goBack }) {
    const [view, setView] = useState('folders');
    const [currentFolder, setCurrentFolder] = useState(null);
    const [currentProject, setCurrentProject] = useState(null);
    const [list, setList] = useState([]);
    const [loading, setLoading] = useState(false);
    const [newName, setNewName] = useState('');
    const [assetData, setAssetData] = useState({ title: '', type: 'code', content: '' });
    const [selectedFile, setSelectedFile] = useState(null);

    useEffect(() => {
        let col = view === 'folders' ? 'folders' : view === 'projects' ? 'projects' : 'assets';
        let q = db.collection(col).orderBy("timestamp", "desc");
        if(view === 'projects' && currentFolder) q = q.where("folderId", "==", currentFolder.id);
        if(view === 'assets' && currentProject) q = q.where("projectId", "==", currentProject.id);
        return q.onSnapshot(s => setList(s.docs.map(d => ({id:d.id, ...d.data()}))));
    }, [view, currentFolder, currentProject]);

    const handlePush = async (e) => {
        if(e) e.preventDefault();
        setLoading(true);
        try {
            if(view === 'assets') {
                let finalUrl = assetData.content;
                if(selectedFile) {
                    const fd = new FormData();
                    fd.append('file', selectedFile);
                    fd.append('upload_preset', 'prince_preset');
                    const res = await fetch('https://api.cloudinary.com/v1_1/dp2dctx9w/auto/upload', { method: 'POST', body: fd });
                    const d = await res.json();
                    finalUrl = d.secure_url;
                }
                await db.collection("assets").add({ ...assetData, content: finalUrl, projectId: currentProject.id, timestamp: window.firebase.firestore.FieldValue.serverTimestamp() });
                setAssetData({ title: '', type: 'code', content: '' }); setSelectedFile(null);
            } else {
                const col = view === 'folders' ? 'folders' : 'projects';
                const data = { name: newName, timestamp: window.firebase.firestore.FieldValue.serverTimestamp() };
                if(view === 'projects') data.folderId = currentFolder.id;
                await db.collection(col).add(data);
                setNewName('');
            }
            alert("Upload Successful! 🚀");
        } catch(err) { alert("Error: " + err.message); }
        setLoading(false);
    };

    return (
        <div className="min-h-screen bg-[#0d1117] text-white p-6 md:p-12 z-50 absolute inset-0">
            <div className="max-w-7xl mx-auto flex justify-between items-center mb-10 border-b border-gray-800 pb-8">
                <h1 className="text-4xl font-black text-orange-500 uppercase">Nexus Management</h1>
                <button onClick={goBack} className="bg-white text-black px-10 py-3 rounded-2xl font-black">EXIT</button>
            </div>

            <div className="max-w-7xl mx-auto mb-10 bg-[#161b22] p-4 rounded-2xl border border-gray-800 text-sm font-bold flex gap-3">
                <span onClick={() => setView('folders')} className="text-blue-400 cursor-pointer">ROOT</span>
                {currentFolder && <><i className="fas fa-chevron-right text-gray-500"></i> <span onClick={() => setView('projects')} className="text-blue-400 cursor-pointer">{currentFolder.name}</span></>}
                {currentProject && <><i className="fas fa-chevron-right text-gray-500"></i> <span className="text-orange-500">{currentProject.name}</span></>}
            </div>

            <div className="max-w-7xl mx-auto">
                {view !== 'assets' ? (
                    <div className="space-y-10">
                        <div className="flex gap-4">
                            <input type="text" value={newName} onChange={e => setNewName(e.target.value)} className="flex-1 bg-[#161b22] p-5 rounded-2xl border border-gray-800 outline-none focus:border-orange-500" placeholder={view === 'folders' ? "Create Folder..." : "Create Project..."} />
                            <button onClick={handlePush} className="bg-orange-600 px-10 rounded-2xl font-black">CREATE</button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                            {list.map(item => (
                                <div key={item.id} onClick={() => view === 'folders' ? (setCurrentFolder(item) || setView('projects')) : (setCurrentProject(item) || setView('assets'))} className="bg-[#161b22] p-10 rounded-[35px] border border-gray-800 text-center hover:border-orange-500 cursor-pointer">
                                    <i className={`fas ${view === 'folders' ? 'fa-folder text-orange-500' : 'fa-project-diagram text-blue-500'} text-6xl mb-4`}></i>
                                    <p className="font-black text-xl uppercase">{item.name}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                ) : (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                        <div className="bg-[#161b22] p-8 rounded-[40px] border border-gray-800">
                            <h3 className="font-black text-orange-500 mb-6 text-xl">UPLOAD ASSET</h3>
                            <form onSubmit={handlePush} className="space-y-6">
                                <input type="text" placeholder="File Title" value={assetData.title} onChange={e => setAssetData({...assetData, title: e.target.value})} className="w-full bg-[#0d1117] p-5 rounded-2xl border border-gray-700" required />
                                <select value={assetData.type} onChange={e => setAssetData({...assetData, type: e.target.value})} className="w-full bg-[#0d1117] p-5 rounded-2xl border border-gray-700">
                                    <option value="code">Source Code</option>
                                    <option value="photo">Image / Photo</option>
                                    <option value="video">Video Link</option>
                                </select>
                                <input type="file" onChange={e => setSelectedFile(e.target.files[0])} className="text-xs text-gray-500 w-full" />
                                <textarea placeholder="Content or URL..." value={assetData.content} onChange={e => setAssetData({...assetData, content: e.target.value})} className="w-full bg-[#0d1117] p-5 rounded-2xl border border-gray-700 h-32"></textarea>
                                <button type="submit" disabled={loading} className="w-full bg-orange-600 py-5 rounded-2xl font-black">
                                    {loading ? "UPLOADING..." : "PUSH ASSET"}
                                </button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
            }

        function App() {
            const [view, setView] = useState('home'); 
            const [project, setProject] = useState('');
            const [user, setUser] = useState(null);

            useEffect(() => { const unsub = auth.onAuthStateChanged(setUser); return unsub; }, []);

            const openProj = (p) => { setProject(p); setView('project'); };

            return (
                <div>
                    <Navbar setView={setView} onOpenProject={openProj} user={user} />
                    {view === 'home' && <HomeView onOpenProject={openProj} />}
                    {view === 'admin' && <AdminDashboard goBack={() => setView('home')} />}
                    {view === 'project' && <ProjectView projectName={project} goBack={() => setView('home')} />}
                </div>
            );
        }

        const root = document.getElementById('root');
        if (root) ReactDOM.createRoot(root).render(<App />);
    </script>
</body>
</html>
