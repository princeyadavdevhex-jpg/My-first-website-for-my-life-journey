<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Yadav | Workspace</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .github-border { border: 1px solid #30363d; }
        .github-bg { background-color: #161b22; }
        .glass-header { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
        pre[class*="language-"] { border-radius: 0 0 8px 8px; margin: 0; background: #0d1117; }
        .profile-banner { background-image: url('https://prince-tech-labs-workspace.vercel.app/1774681471566.png'); background-size: cover; background-position: center; background-repeat: no-repeat; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyAwrlhB5ZQFMaA6wmNC8oXp0_sWVAASrPY", 
            authDomain: "work-space-packet.firebaseapp.com",
            projectId: "work-space-packet",
            storageBucket: "work-space-packet.appspot.com",
            messagingSenderId: "841757590804",
            appId: "1:841757590804:web:9cfe37ee00609b6c046e01"
        };
        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();
        const githubProvider = new window.firebase.auth.GithubAuthProvider();
        const googleProvider = new window.firebase.auth.GoogleAuthProvider();

        const saveUser = (user) => {
            if(!user) return;
            db.collection("users").doc(user.uid).set({
                email: user.email, name: user.displayName || "Workspace User", photoURL: user.photoURL || "", lastLogin: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        };

        // --- SIGN UP MODAL ---
        function SignUpModal({ isOpen, onClose }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            if (!isOpen) return null;

            const handleLogin = (provider) => {
                auth.signInWithPopup(provider).then(res => { saveUser(res.user); alert("Welcome!"); onClose(); }).catch(e => alert(e.message));
            };
            const handleEmail = (e) => {
                e.preventDefault();
                auth.createUserWithEmailAndPassword(email, password).then(res => { saveUser(res.user); alert("Account Created!"); onClose(); }).catch(e => alert(e.message));
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-all">
                    <div className="bg-[#161b22] border border-[#30363d] rounded-xl w-full max-w-md p-8 relative shadow-2xl">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                        <h2 className="text-2xl font-bold text-white mb-6 text-center">Join Workspace</h2>
                        <div className="flex flex-col gap-3 mb-6">
                            <button onClick={()=>handleLogin(googleProvider)} className="flex justify-center gap-3 w-full bg-white text-black font-bold py-2.5 rounded hover:bg-gray-200"><i className="fab fa-google text-red-500 text-lg"></i> Sign up with Google</button>
                            <button onClick={()=>handleLogin(githubProvider)} className="flex justify-center gap-3 w-full bg-[#24292e] text-white font-bold py-2.5 rounded border border-[#30363d] hover:bg-[#30363d]"><i className="fab fa-github text-lg"></i> Sign up with GitHub</button>
                        </div>
                        <div className="flex items-center gap-3 mb-6"><div className="h-px bg-[#30363d] flex-1"></div><span className="text-gray-500 text-xs uppercase font-semibold">Or Email</span><div className="h-px bg-[#30363d] flex-1"></div></div>
                        <form onSubmit={handleEmail} className="flex flex-col gap-4">
                            <input type="email" required placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white outline-none" />
                            <input type="password" required placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white outline-none" />
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded mt-2">Create Account</button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- NAVBAR ---
        function Navbar({ setView, onOpenProject, user }) {
            const [isSignUpOpen, setIsSignUpOpen] = useState(false);
            return (
                <>
                    <nav className="glass-header sticky top-0 z-50 border-b border-[#30363d]">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <i className="fas fa-terminal text-blue-500 text-xl"></i><span className="font-bold hidden md:block text-white">Workspace</span>
                            </div>
                            <div className="flex justify-center gap-6 text-sm font-semibold">
                                <span onClick={() => setView('home')} className="text-white hover:text-blue-400 cursor-pointer">Home</span>
                                <span onClick={() => onOpenProject('2D Projects')} className="text-gray-400 hover:text-white cursor-pointer">2D Projects</span>
                                <span onClick={() => onOpenProject('Real Hardware Project')} className="text-gray-400 hover:text-white cursor-pointer">Real Hardware Project</span>
                            </div>
                            <div className="flex justify-end items-center gap-4">
                                <a href="https://www.youtube.com/@PRINCE_TECHMOTION_LAB" target="_blank" className="text-gray-400 hover:text-red-500"><i className="fab fa-youtube text-xl"></i></a>
                                <a href="https://github.com/princeyadavdevhex-jpg" target="_blank" className="text-gray-400 hover:text-white"><i className="fab fa-github text-xl"></i></a>
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <img src={user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${user.email}`} className="w-8 h-8 rounded-full border border-[#30363d]" />
                                        <button onClick={() => auth.signOut()} className="text-red-400 text-sm font-bold">Logout</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsSignUpOpen(true)} className="bg-blue-600 text-white text-sm font-bold px-4 py-1.5 rounded">Sign Up</button>
                                )}
                            </div>
                        </div>
                    </nav>
                    <SignUpModal isOpen={isSignUpOpen} onClose={() => setIsSignUpOpen(false)} />
                </>
            );
        }

        // --- HOME VIEW ---
        function HomeView({ onOpenProject }) {
            const projects = [
                { id: '2D Projects', icon: 'fa-gamepad text-pink-400', tech: 'C++ / Python' },
                { id: 'Real Hardware Project', icon: 'fa-microchip text-green-400', tech: 'Embedded C++' },
                { id: 'Nexus OS Architecture', icon: 'fa-laptop-code text-blue-400', tech: 'Assembly' }
            ];
            const skills = [
                { name: 'C++ Architecture', icon: 'fa-code text-blue-500' },
                { name: 'Python / AI', icon: 'fab fa-python text-yellow-400' },
                { name: 'Ethical Hacking', icon: 'fa-shield-alt text-green-500' },
                { name: 'Web Development', icon: 'fa-globe text-cyan-400' }
            ];

            return (
                <div className="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
                    <div className="w-full rounded-xl overflow-hidden github-border mb-10">
                        <div className="w-full aspect-[16/9] md:aspect-[21/9] profile-banner relative"></div>
                        <div className="github-bg px-6 pb-6 relative">
                            <div className="flex justify-between items-end -mt-16 mb-4 relative z-10">
                                <div className="flex items-end gap-4">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Prince" className="w-32 h-32 rounded-full border-4 border-[#161b22] bg-[#0d1117]" />
                                    <div className="pb-2">
                                        <h1 className="text-3xl font-bold text-white">Prince Yadav</h1>
                                        <p className="text-gray-400 text-sm">@princeyadavdevhex-jpg • C++ & Tech Explorer</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="md:col-span-1">
                            <div className="bg-[#161b22] github-border rounded-lg p-5">
                                <h3 className="font-bold border-b border-[#30363d] pb-2 mb-4 text-white">Core Skills</h3>
                                <div className="flex flex-col gap-4">
                                    {skills.map(s => (
                                        <div key={s.name} className="flex items-center gap-3 text-gray-300"><i className={`fas ${s.icon} text-lg`}></i> {s.name}</div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        <div className="md:col-span-2">
                            <div className="flex justify-between items-center border-b border-[#30363d] pb-2 mb-4">
                                <h2 className="text-lg font-semibold text-white"><i className="fas fa-folder-open mr-2 text-yellow-500"></i> Repositories</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {projects.map(p => (
                                    <div key={p.id} onClick={() => onOpenProject(p.id)} className="github-border github-bg rounded-lg p-4 hover:border-blue-500 cursor-pointer group">
                                        <div className="flex gap-3">
                                            <i className={`fas ${p.icon} mt-1`}></i>
                                            <div>
                                                <h3 className="text-blue-400 font-semibold group-hover:underline text-lg">{p.id}</h3>
                                                <span className="text-xs text-gray-400 mt-2 block">{p.tech}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-8 github-border github-bg rounded-lg p-6">
                                <h2 className="text-lg font-semibold border-b border-[#30363d] pb-2 mb-4 text-white">README.md</h2>
                                <div className="text-gray-300 text-sm font-mono space-y-2">
                                    <p>&gt; Hi, I'm Prince! 👋</p>
                                    <p>&gt; I am a student in Class 8 at JNV Prayagraj passionate about system architectures, web dev, and hacking.</p>
                                    <p>&gt; Feel free to open any project folder above and review my code!</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- PROJECT VIEW ---
        function ProjectView({ projectName, goBack }) {
            const [openedFile, setOpenedFile] = useState(null);
            const dummyCode = "// C++ Logic for " + projectName + "\n#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << \"Hello Prince!\" << endl;\n    return 0;\n}";

            useEffect(() => { if (openedFile && window.Prism) window.Prism.highlightAll(); }, [openedFile]);

            if (!openedFile) {
                return (
                    <div className="max-w-6xl mx-auto px-4 py-8">
                        <button onClick={goBack} className="mb-6 text-blue-400 hover:text-white font-semibold"><i className="fas fa-arrow-left mr-2"></i>Back</button>
                        <div className="github-border github-bg rounded-xl p-8 min-h-[500px]">
                            <h2 className="text-3xl font-bold text-white mb-6 border-b border-[#30363d] pb-4"><i className="fas fa-folder-open text-yellow-500 mr-3"></i> {projectName}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div onClick={() => setOpenedFile('main.cpp')} className="bg-[#0d1117] border border-[#30363d] rounded-lg p-4 hover:border-blue-500 cursor-pointer flex gap-4">
                                    <i className="fas fa-file-code text-3xl text-blue-400"></i><div><h3 className="text-white font-bold">main.cpp</h3><p className="text-sm text-gray-500">Source Code</p></div>
                                </div>
                                <div onClick={() => setOpenedFile('docs.pdf')} className="bg-[#0d1117] border border-[#30363d] rounded-lg p-4 hover:border-blue-500 cursor-pointer flex gap-4">
                                    <i className="fas fa-file-pdf text-3xl text-red-400"></i><div><h3 className="text-white font-bold">docs.pdf</h3><p className="text-sm text-gray-500">Documentation</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <button onClick={() => setOpenedFile(null)} className="mb-6 text-blue-400 hover:text-white font-semibold"><i className="fas fa-arrow-left mr-2"></i>Back to Folder</button>
                    <div className="github-border github-bg rounded-xl p-8 shadow-lg">
                        <h2 className="text-2xl font-bold text-white mb-6 border-b border-[#30363d] pb-4"><i className="fas fa-file-code text-blue-400 mr-3"></i> {openedFile}</h2>
                        
                        <div className="mb-8">
                            <div className="flex justify-between items-center bg-[#161b22] border border-[#30363d] border-b-0 rounded-t-lg px-4 py-3">
                                <span className="text-gray-400 text-sm font-mono">Source Code</span>
                                <div className="flex gap-2">
                                    <button onClick={()=>alert('Copied!')} className="text-xs bg-[#30363d] text-white px-3 py-1.5 rounded"><i className="fas fa-copy"></i> Copy</button>
                                    <button onClick={()=>alert('Request Sent!')} className="text-xs bg-orange-600 text-white px-3 py-1.5 rounded"><i className="fas fa-code-pull-request"></i> Edit Request</button>
                                </div>
                            </div>
                            <div className="border border-[#30363d] rounded-b-lg bg-[#0d1117] p-4 overflow-x-auto"><pre className="m-0"><code className="language-cpp">{dummyCode}</code></pre></div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div className="border border-[#30363d] rounded-lg p-5 bg-[#0d1117] text-center text-gray-500"><i className="fas fa-image text-3xl mb-2 text-green-400"></i><p>No Images</p></div>
                            <div className="border border-[#30363d] rounded-lg p-5 bg-[#0d1117] text-center text-gray-500"><i className="fas fa-file-pdf text-3xl mb-2 text-red-400"></i><p>No PDFs</p></div>
                        </div>

                        <div className="bg-[#1c2128] border border-blue-500/30 rounded-lg p-6">
                            <h3 className="text-xl font-bold text-white mb-2"><i className="fas fa-info-circle text-blue-400 mr-2"></i> About Project</h3>
                            <p className="text-gray-300 text-sm">Author: Prince Yadav (Class 8, JNV Prayagraj)<br/>Inspiration: Learning hardware and OS development.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- APP ROOT ---
        function App() {
            const [view, setView] = useState('home'); 
            const [project, setProject] = useState('');
            const [user, setUser] = useState(null);

            useEffect(() => { const unsub = auth.onAuthStateChanged(setUser); return unsub; }, []);

            const openProj = (p) => { setProject(p); setView('project'); };

            return (
                <div>
                    <Navbar setView={setView} onOpenProject={openProj} user={user} />
                    {view === 'home' && <HomeView onOpenProject={openProj} />}
                    {view === 'project' && <ProjectView projectName={project} goBack={() => setView('home')} />}
                </div>
            );
        }

        const root = document.getElementById('root');
        if (root) ReactDOM.createRoot(root).render(<App />);
    </script>
</body>
</html>
