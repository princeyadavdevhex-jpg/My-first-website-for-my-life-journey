            const [openedFile, setOpenedFile] = useState(null);

                }

            const dummyCode = `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello Workspace from Prince!" << endl;\n    // Start coding here\n    return 0;\n}`;

            const handleCopy = () => { alert("Code Copied successfully!"); };
            const handleRequestEdit = () => { alert("Edit Request sent to Prince Yadav for approval!"); };

            // 1. Agar koi file open nahi hai, toh Files ki list dikhao
            if (!openedFile) {
                return (

                                    <div>
                                        <h3 className="text-white font-bold text-lg">main_project.cpp</h3>
                                        <p className="text-sm text-gray-500">Core logic and source code</p>
                                    </div>
                                </div>
                                <div onClick={() => setOpenedFile('hardware_schematics.pdf')} className="github-border bg-[#0d1117] rounded-lg p-4 hover:border-blue-500 cursor-pointer flex items-center gap-4 transition-colors">

                                </div>
                            </div>
                            <div className="github-border rounded-b-lg overflow-hidden bg-[#0d1117] p-4 max-h-[400px] overflow-y-auto">
