    <style>
        /* Custom GitHub Dark Theme Styles */

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }

        /* Code Block Styles */
        pre[class*="language-"] { 
            border-radius: 0 0 8px 8px; 
            margin: 0; 
            background: #0d1117 !important; 
            font-size: 14px;
        }
        .edit-textarea { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Courier New', Courier, monospace; 
            width: 100%; 
            min-height: 400px; 
            padding: 15px; 
            border: none; 
            outline: none; 
            resize: vertical; 
            line-height: 1.5;
        }
        
        /* Profile Banner */
        .profile-banner {
            background-image: url('https://prince-tech-labs-workspace.vercel.app/1774681471566.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

        }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {

        }
        
        .chat-bubble {
            max-width: 80%;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            word-wrap: break-word;
        }
        .chat-user { background-color: #1f6feb; color: white; border-bottom-right-radius: 2px; align-self: flex-end; }
        .chat-bot { background-color: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // FIREBASE SETUP (Initialized safely)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAwrlhB5ZQFMaA6wmNC8oXp0_sWVAASrPY",
            authDomain: "work-space-packet.firebaseapp.com",
            projectId: "work-space-packet",
            storageBucket: "work-space-packet.appspot.com",
            messagingSenderId: "841757590804",
            appId: "1:841757590804:web:9cfe37ee00609b6c046e01"
        };

        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const githubProvider = new window.firebase.auth.GithubAuthProvider();

        // ==========================================
        // 1. SIGN UP / LOGIN MODAL COMPONENT
        // ==========================================
        function SignUpModal({ isOpen, onClose }) {
            const [isLoginView, setIsLoginView] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [errorMsg, setErrorMsg] = useState("");
            const [loading, setLoading] = useState(false);

            if (!isOpen) return null;

            const handleGithubLogin = () => {
                setErrorMsg("");
                auth.signInWithPopup(githubProvider)
                .then((result) => {
                    alert("Welcome " + (result.user.displayName || "Hacker") + "! Login Successful 🚀");
                    onClose();
                }).catch((error) => {
                    setErrorMsg(error.message);
                });
            };

            const handleEmailAuth = (e) => {
                e.preventDefault();
                setErrorMsg("");
                setLoading(true);

                if (isLoginView) {
                    auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        alert("Login Successful! Welcome back.");
                        setLoading(false);
                        onClose();
                    })
                    .catch((error) => {
                        setErrorMsg(error.message);
                        setLoading(false);
                    });
                } else {
                    auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        alert("Account Created Successfully! Welcome to the Workspace.");
                        setLoading(false);
                        onClose();
                    })
                    .catch((error) => {
                        setErrorMsg(error.message);
                        setLoading(false);
                    });
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in transition-all">
                    <div className="bg-[#161b22] border border-[#30363d] rounded-xl w-full max-w-md p-8 relative shadow-2xl">
                        {/* Close Button */}
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                            <i className="fas fa-times text-xl"></i>
                        </button>

                        <div className="text-center mb-6">
                            <i className="fas fa-terminal text-blue-500 text-3xl mb-3"></i>
                            <h2 className="text-2xl font-bold text-white">{isLoginView ? 'Welcome Back' : 'Join Workspace'}</h2>
                            <p className="text-gray-400 text-sm mt-1">
                                {isLoginView ? 'Access your projects and environment.' : 'Create an account to manage your projects.'}
                            </p>
                        </div>

                        {errorMsg && (
                            <div className="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-md text-sm mb-4 text-center">
                                {errorMsg}
                            </div>
                        )}

                        {/* GitHub Auth Button */}
                        <button onClick={handleGithubLogin} className="w-full bg-[#24292e] hover:bg-[#2f363d] text-white font-bold py-2.5 px-4 rounded-md flex items-center justify-center gap-3 transition-colors border border-[#30363d]">
                            <i className="fab fa-github text-lg"></i>
                            {isLoginView ? 'Sign in with GitHub' : 'Sign up with GitHub'}
                        </button>

                        {/* Divider */}
                        <div className="flex items-center gap-3 my-6">
                            <div className="h-px bg-[#30363d] flex-1"></div>
                            <span className="text-gray-500 text-xs uppercase font-semibold">Or continue with email</span>
                            <div className="h-px bg-[#30363d] flex-1"></div>
                        </div>

                        {/* Email / Password Form */}
                        <form onSubmit={handleEmailAuth} className="flex flex-col gap-4">
                            <div>
                                <label className="block text-gray-300 text-sm font-semibold mb-1">Email Address</label>
                                <input 
                                    type="email" 
                                    required 
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="prince@example.com" 
                                    className="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors" 
                                />
                            </div>
                            <div>
                                <label className="block text-gray-300 text-sm font-semibold mb-1">Password</label>
                                <input 
                                    type="password" 
                                    required 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="••••••••" 
                                    className="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors" 
                                />
                            </div>
                            <button disabled={loading} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 text-white font-bold py-2.5 rounded-md transition-colors mt-2 shadow-[0_0_15px_rgba(59,130,246,0.3)] flex justify-center items-center gap-2">
                                {loading ? <i className="fas fa-spinner fa-spin"></i> : null}
                                {isLoginView ? 'Sign In' : 'Create Account'}
                            </button>
                        </form>

                        <div className="mt-6 text-center text-sm text-gray-400">
                            {isLoginView ? "Don't have an account? " : "Already have an account? "}
                            <button onClick={() => setIsLoginView(!isLoginView)} className="text-blue-400 hover:text-blue-300 font-semibold hover:underline">
                                {isLoginView ? 'Sign up' : 'Log in'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 2. NAVBAR COMPONENT
        // ==========================================
        function Navbar({ currentUser, onLogout }) {
            const [isSignUpOpen, setIsSignUpOpen] = useState(false);

            return (
                <>
                    <nav className="glass-header sticky top-0 z-50 border-b border-[#30363d]">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            
                            {/* Logo */}
                            <div className="flex items-center gap-3 cursor-pointer">
                                <i className="fas fa-terminal text-blue-500 text-2xl"></i>
                                <span className="font-bold text-lg hidden sm:block text-white tracking-wide">Prince_Workspace</span>
                            </div>

                            {/* Center Links */}
                            <div className="hidden md:flex justify-center gap-8 text-sm font-semibold">
                                <a href="#" className="text-white hover:text-blue-400 transition-colors relative after:content-[''] after:absolute after:-bottom-4 after:left-0 after:w-full after:h-0.5 after:bg-blue-500">Home</a>
                                <a href="#" className="text-gray-400 hover:text-white transition-colors">2D Projects</a>
                                <a href="#" className="text-gray-400 hover:text-white transition-colors">Hardware Projects</a>
                            </div>

                            {/* Right Actions */}
                            <div className="flex justify-end items-center gap-5">
                                <a href="https://www.youtube.com/@PRINCE_TECHMOTION_LAB" target="_blank" className="text-gray-400 hover:text-red-500 transition-colors transform hover:scale-110" title="YouTube">
                                    <i className="fab fa-youtube text-xl"></i>
                                </a>
                                <a href="https://github.com/princeyadavdevhex-jpg" target="_blank" className="text-gray-400 hover:text-white transition-colors transform hover:scale-110" title="GitHub">
                                    <i className="fab fa-github text-xl"></i>
                                </a>

                                {currentUser ? (
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                                            {currentUser.email ? currentUser.email[0].toUpperCase() : 'U'}
                                        </div>
                                        <button onClick={onLogout} className="text-sm text-gray-400 hover:text-red-400 transition-colors">
                                            Logout
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={() => setIsSignUpOpen(true)}
                                        className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-5 py-2 rounded-md transition-all shadow-[0_0_15px_rgba(59,130,246,0.4)] hover:shadow-[0_0_20px_rgba(59,130,246,0.6)]">
                                        Sign Up
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <SignUpModal isOpen={isSignUpOpen} onClose={() => setIsSignUpOpen(false)} />
                </>
            );
        }

        // ==========================================
        // 3. HOME VIEW COMPONENT
        // ==========================================
        function HomeView({ onOpenProject }) {
            return (
                <div className="animate-fade-in max-w-7xl mx-auto px-4 py-8">
                    {/* Banner & Profile Info */}
                    <div className="w-full rounded-xl overflow-hidden github-border mb-10 shadow-lg">
                        <div className="w-full aspect-[21/9] profile-banner relative">
                            {/* Overlay gradient for better text readability if needed */}
                            <div className="absolute inset-0 bg-gradient-to-t from-[#161b22] to-transparent opacity-60"></div>
                        </div>
                        <div className="github-bg px-6 pb-6 relative">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end -mt-16 md:-mt-20 mb-4 relative z-10">
                                <div className="flex items-end gap-5">
                                    <div className="w-28 h-28 md:w-36 md:h-36 rounded-full border-4 border-[#161b22] overflow-hidden bg-[#0d1117] flex-shrink-0 shadow-xl">
                                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Prince" alt="Prince Yadav" className="w-full h-full object-cover p-2" />
                                    </div>
                                    <div className="pb-2">
                                        <h1 className="text-3xl md:text-4xl font-bold text-white mb-1">Prince Yadav</h1>
                                        <p className="text-gray-400 text-base flex items-center gap-2">
                                            @princeyadav <span className="w-1 h-1 rounded-full bg-gray-500"></span> 
                                            System Architect & Tech Explorer
                                        </p>
                                    </div>
                                </div>
                                <div className="mt-6 md:mt-0 pb-2 w-full md:w-auto flex gap-3">
                                    <button className="flex-1 md:flex-none bg-[#21262d] border border-[#30363d] text-white font-semibold px-4 py-2 rounded-md hover:bg-[#30363d] transition-colors text-sm flex items-center justify-center gap-2">
                                        <i className="far fa-star"></i> Sponsor
                                    </button>
                                    <button className="flex-1 md:flex-none bg-white text-black font-bold px-6 py-2 rounded-md hover:bg-gray-200 transition-colors text-sm">
                                        Follow
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        {/* Skills & Info Sidebar */}
                        <div className="lg:col-span-1 space-y-6">
                            {/* Bio */}
                            <div className="text-gray-300 text-sm leading-relaxed">
                                <p>Building the future with code. Passionate about OS development, Hardware integration, and AI logic.</p>
                                <div className="mt-4 space-y-2 text-gray-400">
                                    <div className="flex items-center gap-2"><i className="fas fa-map-marker-alt w-5 text-center"></i> JNV Prayagraj, India</div>
                                    <div className="flex items-center gap-2"><i className="fas fa-envelope w-5 text-center"></i> <a href="#" className="hover:text-blue-400">Contact me</a></div>
                                    <div className="flex items-center gap-2"><i className="fas fa-link w-5 text-center"></i> <a href="#" className="hover:text-blue-400">prince-tech-labs</a></div>
                                </div>
                            </div>
