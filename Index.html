<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Yadav | Workspace</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .github-border { border: 1px solid #30363d; }
        .github-bg { background-color: #161b22; }
        .glass-header { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }

        pre[class*="language-"] { border-radius: 0 0 8px 8px; margin: 0; background: #0d1117; }
        .edit-textarea { background: #0d1117; color: #c9d1d9; font-family: monospace; width: 100%; min-height: 250px; padding: 15px; border: none; outline: none; resize: vertical; }
        
        .profile-banner {
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. NAVBAR COMPONENT
        // ==========================================
        function Navbar() {
            return (
                <nav className="glass-header sticky top-0 z-50 border-b border-[#30363d]">
                    <div className="max-w-6xl mx-auto px-4 py-3 grid grid-cols-3 items-center">
                        <div className="flex items-center gap-2">
                            <i className="fas fa-terminal text-blue-500 text-xl"></i>
                            <span className="font-bold hidden md:block text-white">Workspace</span>
                        </div>
                        <div className="flex justify-center gap-6 text-sm font-semibold">
                            <a href="#" className="text-white hover:text-blue-400 transition-colors">Home</a>
                            <a href="#" className="text-gray-400 hover:text-white transition-colors">Projects</a>
                            <a href="#" className="text-gray-400 hover:text-white transition-colors">About</a>
                        </div>
                        <div className="flex justify-end items-center gap-4">
                            <a href="#" className="text-gray-400 hover:text-red-500 transition-colors" title="YouTube"><i className="fab fa-youtube text-lg"></i></a>
                            <a href="#" className="text-gray-400 hover:text-white transition-colors" title="GitHub"><i className="fab fa-github text-lg"></i></a>
                            <button className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-1.5 rounded-md transition-colors shadow-[0_0_10px_rgba(59,130,246,0.3)]">
                                Sign Up
                            </button>
                        </div>
                    </div>
                </nav>
            );
        }

        // ==========================================
        // 2. HOME VIEW COMPONENT
        // ==========================================
        function HomeView({ onOpenProject }) {
            return (
                <div className="animate-fade-in">
                    {/* Banner & Profile Info */}
                    <div className="w-full rounded-xl overflow-hidden github-border mb-10">
                        <div className="w-full h-48 md:h-64 profile-banner relative"></div>
                        <div className="github-bg px-6 pb-6 relative">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end -mt-12 md:-mt-16 mb-4 relative z-10">
                                <div className="flex items-end gap-4">
                                    <div className="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-[#161b22] overflow-hidden bg-[#0d1117] flex-shrink-0">
                                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Prince" alt="Logo" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="pb-2">
                                        <h1 className="text-2xl md:text-3xl font-bold text-white">Prince Yadav</h1>
                                        <p className="text-gray-400 text-sm">@princeyadav • C++ & Tech Explorer</p>
                                    </div>
                                </div>
                                <div className="mt-4 md:mt-0 pb-2">
                                    <button className="bg-white text-black font-bold px-5 py-2 rounded-full hover:bg-gray-200 transition-colors text-sm">
                                        Contact Me
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Skills Sidebar */}
                        <div className="md:col-span-1">
                            <div className="bg-[#161b22] github-border rounded-lg p-5 text-sm">
                                <h3 className="font-bold border-b border-[#30363d] pb-2 mb-4 text-white">Core Skills</h3>
                                <div className="flex flex-col gap-3">
                                    <div className="flex items-center gap-3"><i className="devicon-cplusplus-plain text-blue-500 text-lg"></i> C++ Architecture</div>
                                    <div className="flex items-center gap-3"><i className="fab fa-python text-yellow-400 text-lg"></i> Python / AI</div>
                                    <div className="flex items-center gap-3"><i className="fas fa-shield-alt text-green-500 text-lg"></i> Ethical Hacking</div>
                                    <div className="flex items-center gap-3"><i className="fas fa-globe text-cyan-400 text-lg"></i> Web Development</div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Projects Repositories */}
                        <div className="md:col-span-2">
                            <div className="flex justify-between items-center border-b border-[#30363d] pb-2 mb-4">
                                <h2 className="text-lg font-semibold text-white"><i className="fas fa-folder-open mr-2 text-yellow-500"></i> Project Repositories</h2>
                                <span className="bg-[#161b22] px-2 py-1 rounded-full text-xs border border-[#30363d]">3 Public</span>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {/* Folder 1 */}
                                <div onClick={() => onOpenProject('Solar Panel Tracker')} className="github-border github-bg rounded-lg p-4 hover:border-blue-500 cursor-pointer transition-colors group">
                                    <div className="flex items-start gap-3">
                                        <i className="fas fa-solar-panel text-gray-500 mt-1 group-hover:text-blue-400 transition-colors"></i>
                                        <div>
                                            <h3 className="text-blue-400 font-semibold group-hover:underline text-lg">Solar Panel Tracker</h3>
                                            <div className="flex items-center gap-4 mt-4 text-xs text-gray-400">
                                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-yellow-500"></span> C++</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Folder 2 */}
                                <div onClick={() => onOpenProject('Nexus OS Architecture')} className="github-border github-bg rounded-lg p-4 hover:border-blue-500 cursor-pointer transition-colors group">
                                    <div className="flex items-start gap-3">
                                        <i className="fas fa-microchip text-gray-500 mt-1 group-hover:text-blue-400 transition-colors"></i>
                                        <div>
                                            <h3 className="text-blue-400 font-semibold group-hover:underline text-lg">Nexus OS</h3>
                                            <div className="flex items-center gap-4 mt-4 text-xs text-gray-400">
                                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-yellow-500"></span> C++ / Assembly</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Folder 3 */}
                                <div onClick={() => onOpenProject('AI School Platform')} className="github-border github-bg rounded-lg p-4 hover:border-blue-500 cursor-pointer transition-colors group">
                                    <div className="flex items-start gap-3">
                                        <i className="fas fa-robot text-gray-500 mt-1 group-hover:text-blue-400 transition-colors"></i>
                                        <div>
                                            <h3 className="text-blue-400 font-semibold group-hover:underline text-lg">AI School Platform</h3>
                                            <div className="flex items-center gap-4 mt-4 text-xs text-gray-400">
                                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-500"></span> Python</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* README Section */}
                            <div className="mt-10 github-border github-bg rounded-lg p-6">
                                <h2 className="text-lg font-semibold border-b border-[#30363d] pb-2 mb-4 text-white">README.md</h2>
                                <div className="text-gray-300 text-sm leading-relaxed font-mono">
                                    <p className="mb-2">&gt; Hi, I'm Prince! 👋</p>
                                    <p className="mb-2">&gt; I am a student passionate about system architectures, web dev, and coding.</p>
                                    <p className="mb-2">&gt; Feel free to open any project folder above, review my code, and propose edits if you find bugs!</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. PROJECT DETAIL VIEW COMPONENT
        // ==========================================
        function ProjectView({ projectName, goBack }) {
            // State for Code Box
            const defaultCode = `// Core Logic Implementation\n#include <iostream>\n\nvoid initializeSystem() {\n    std::cout << "System Booting Up..." << std::endl;\n    // Add your module logic here\n    int sensorValue = 100;\n    \n    if(sensorValue > 50) {\n        std::cout << "Optimizing output..." << std::endl;\n    }\n}\n\nint main() {\n    initializeSystem();\n    return 0;\n}`;
            
            const [isEditing, setIsEditing] = useState(false);
            const [codeText, setCodeText] = useState(defaultCode);
            const [copied, setCopied] = useState(false);
            const [requestPending, setRequestPending] = useState(false);

            // State for Chat System
            const [chatInput, setChatInput] = useState("");
            const [messages, setMessages] = useState([
                { id: 1, sender: 'Prince', text: 'Hello! Is project ka code upar diya gaya hai. Koi doubt ho toh yahan pucho.', isUser: false }
            ]);
            const chatEndRef = useRef(null);

            // Trigger Prism highlighting on load & when exiting edit mode
            useEffect(() => {
                if (!isEditing && window.Prism) {
                    window.Prism.highlightAll();
                }
            }, [isEditing, codeText]);

            // Auto-scroll chat
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Handlers
            const handleCopy = () => {
                navigator.clipboard.writeText(codeText);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleSubmitEdit = () => {
                setIsEditing(false);
                setRequestPending(true);
            };

            const handleSendMessage = () => {
                if(chatInput.trim() === '') return;
                setMessages([...messages, { id: Date.now(), sender: 'User', text: chatInput, isUser: true }]);
                setChatInput("");
            };

            return (
                <div className="animate-fade-in pb-20 mt-8">
                    <button onClick={goBack} className="text-blue-400 hover:text-blue-300 mb-6 flex items-center gap-2">
                        <i className="fas fa-arrow-left"></i> Back to Workspace
                    </button>
                    
                    <h1 className="text-3xl font-bold mb-4 flex items-center gap-3 text-white">
                        <i className="fas fa-folder-open text-blue-500"></i> {projectName}
                    </h1>
                    
                    <div className="github-border github-bg rounded-lg p-6 mb-8">
                        <p className="text-gray-300 mb-6 leading-relaxed">Is project folder mein saari source code files, testing videos, aur documentation available hai.</p>

                        {/* Image Block */}
                        <h3 className="font-semibold text-white mt-6 mb-2">Step 1: Circuit / Architecture Design</h3>
                        <p className="text-gray-400 text-sm mb-4">Architecture diagram niche diya gaya hai.</p>
                        <div className="w-full h-64 bg-[#0d1117] rounded-lg border border-[#30363d] flex items-center justify-center mb-6 overflow-hidden relative">
                            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" className="object-cover w-full h-full opacity-60" alt="Architecture" />
                            <div className="absolute inset-0 flex items-center justify-center">
                                <span className="bg-black/50 px-4 py-2 rounded text-white"><i className="fas fa-image mr-2"></i>Project Diagram</span>
                            </div>
                        </div>

                        {/* Code Box Block */}
                        <h3 className="font-semibold text-white mt-8 mb-2">Step 2: Source Code</h3>
                        <p className="text-gray-400 text-sm mb-2">Agar tumhe is logic mein koi bug dikhe, toh 'Propose Edit' par click karke change request bhejo.</p>
                        
                        <div className="github-border rounded-lg overflow-hidden my-6">
                            <div className="bg-[#161b22] px-4 py-2 flex justify-between items-center border-b border-[#30363d]">
                                <span className="text-xs text-gray-400 uppercase font-bold">C++</span>
                                <div className="flex gap-2">
                                    {requestPending && (
                                        <span className="text-xs bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded border border-yellow-500/50 flex items-center">
                                            <i className="fas fa-code-pull-request mr-1"></i> Request Pending
                                        </span>
                                    )}
                                    <button onClick={() => setIsEditing(!isEditing)} className="text-xs bg-[#21262d] hover:bg-[#30363d] px-3 py-1 rounded transition-colors text-gray-300 flex items-center">
                                        <i className={isEditing ? "fas fa-times mr-1" : "fas fa-pencil-alt mr-1"}></i> {isEditing ? "Cancel" : "Propose Edit"}
                                    </button>
                                    <button onClick={handleCopy} className="text-xs bg-[#21262d] hover:bg-[#30363d] px-3 py-1 rounded transition-colors text-gray-300 flex items-center">
                                        <i className={copied ? "fas fa-check text-green-500 mr-1" : "far fa-copy mr-1"}></i> {copied ? "Copied" : "Copy"}
                                    </button>
                                </div>
                            </div>
                            
                            {isEditing ? (
                                <div className="flex flex-col">
                                    <textarea 
                                        value={codeText} 
                                        onChange={(e) => setCodeText(e.target.value)} 
                                        className="edit-textarea" 
                                        spellCheck={false} 
                                    />
                                    <div className="bg-[#161b22] p-3 text-right border-t border-[#30363d]">
                                        <button onClick={handleSubmitEdit} className="bg-green-600 hover:bg-green-700 text-white px-4 py-1 rounded text-sm font-semibold">
                                            Submit Request
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <pre><code className="language-cpp">{codeText}</code></pre>
                            )}
                        </div>

                        {/* Video Block */}
                        <h3 className="font-semibold text-white mt-10 mb-4 border-b border-[#30363d] pb-2"><i className="fas fa-play-circle mr-2 text-red-500"></i> Final Output Video</h3>
                        <div className="w-full bg-black rounded-lg overflow-hidden border border-[#30363d] mb-10">
                            <video className="w-full" controls>
                                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
                                Your browser does not support HTML video.
                            </video>
                        </div>

                        {/* PDF Block */}
                        <h3 className="font-semibold text-white mt-10 mb-4 border-b border-[#30363d] pb-2"><i className="fas fa-file-pdf mr-2 text-orange-500"></i> Project Report (PDF)</h3>
                        <div className="w-full h-96 border border-[#30363d] rounded-lg overflow-hidden bg-white mb-10">
                            <iframe src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" width="100%" height="100%" style={{ border: 'none' }}></iframe>
                        </div>
                    </div>

                    {/* Chat System */}
                    <div className="github-border rounded-lg overflow-hidden">
                        <div className="bg-[#161b22] p-3 border-b border-[#30363d] font-semibold text-white">
                            <i className="far fa-comments text-green-400 mr-2"></i> Project Discussion
                        </div>
                        <div className="h-56 bg-[#0d1117] p-4 overflow-y-auto flex flex-col gap-4">
                            {messages.map((msg) => (
                                <div key={msg.id} className={`flex gap-3 ${msg.isUser ? 'flex-row-reverse animate-fade-in' : ''}`}>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-white font-bold ${msg.isUser ? 'bg-gray-600' : 'bg-blue-600'}`}>
                                        {msg.isUser ? 'U' : 'P'}
                                    </div>
                                    <div className={`border p-3 rounded-lg text-sm text-white max-w-[80%] ${msg.isUser ? 'bg-blue-600 border-blue-500 rounded-tr-none' : 'bg-[#161b22] border-[#30363d] rounded-tl-none'}`}>
                                        {msg.text}
                                    </div>
                                </div>
                            ))}
                            <div ref={chatEndRef} />
                        </div>
                        <div className="bg-[#161b22] p-3 flex gap-2 border-t border-[#30363d]">
                            <input 
                                type="text" 
                                value={chatInput}
                                onChange={(e) => setChatInput(e.target.value)}
                                onKeyPress={(e) => { if(e.key === 'Enter') handleSendMessage(); }}
                                placeholder="Type your message..." 
                                className="flex-1 bg-[#0d1117] border border-[#30363d] rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" 
                            />
                            <button onClick={handleSendMessage} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-semibold transition-colors">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. MAIN APP CONTROLLER
        // ==========================================
        function App() {
            const [view, setView] = useState('home'); // 'home' or 'project'
            const [selectedProject, setSelectedProject] = useState('');

            const handleOpenProject = (projectName) => {
                setSelectedProject(projectName);
                setView('project');
                window.scrollTo(0, 0);
            };

            const handleGoBack = () => {
                setView('home');
                window.scrollTo(0, 0);
            };

            return (
                <div>
                    <Navbar />
                    <main className="max-w-6xl mx-auto px-4 mt-6 pb-12">
                        {view === 'home' ? (
                            <HomeView onOpenProject={handleOpenProject} />
                        ) : (
                            <ProjectView projectName={selectedProject} goBack={handleGoBack} />
                        )}
                    </main>
                </div>
            );
        }

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
